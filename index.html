<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>旅遊預算追蹤</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f5f5f3;--bg2:#eeecea;
  --text:#1a1a18;--text2:#5a5a57;--text3:#888780;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --inp-bg:#eeecea;
  --card:#fff;--card2:#f9f9f7;
  --ok-bg:#EAF3DE;--ok-txt:#3B6D11;
  --over-bg:#FCEBEB;--over-txt:#A32D2D;
  --warn-txt:#854F0B;
  --blue:#185FA5;--red:#E24B4A;--green:#639922;--amber:#BA7517;--gray:#B4B2A9;
  --radius:8px;--radius-lg:12px;
}
[data-theme="dark"]{
  --bg:#1a1a18;--bg2:#252523;
  --text:#f0efec;--text2:#b0aea8;--text3:#777570;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --inp-bg:#2a2a27;
  --card:#2e2e2b;--card2:#252523;
  --ok-bg:#1a3310;--ok-txt:#7dc454;
  --over-bg:#3a1010;--over-txt:#f08080;
  --warn-txt:#e8a040;
  --blue:#5b9fd6;--red:#f07070;--green:#7dc454;--amber:#e8a040;--gray:#777570;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;}
.app{max-width:480px;margin:0 auto;padding:1rem 1rem 4rem;}

/* auth screen */
.auth-screen{max-width:380px;margin:80px auto;padding:2rem;background:var(--card);border-radius:var(--radius-lg);border:0.5px solid var(--border);}
.auth-title{font-size:20px;font-weight:500;margin-bottom:6px;color:var(--text);}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.5;}
.auth-input{width:100%;font-size:16px;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--inp-bg);color:var(--text);outline:none;margin-bottom:10px;}
.auth-btn{width:100%;padding:11px;border:none;border-radius:var(--radius);background:var(--blue);color:#fff;font-size:15px;font-weight:500;cursor:pointer;}
.auth-btn:hover{opacity:0.9;}
.auth-btn:disabled{opacity:0.5;cursor:default;}
.auth-msg{font-size:13px;color:var(--text3);margin-top:10px;text-align:center;line-height:1.5;}
.auth-msg.success{color:var(--ok-txt);}
.auth-msg.error{color:var(--over-txt);}

/* top bar */
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.trip-inp{font-size:16px;font-weight:500;border:none;background:transparent;color:var(--text);flex:1;padding:0;outline:none;min-width:0;}
.icon-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:4px 9px;font-size:13px;cursor:pointer;color:var(--text);flex-shrink:0;white-space:nowrap;}
.icon-btn:hover{background:var(--bg2);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sync-dot.syncing{background:var(--amber);}
.sync-dot.offline{background:var(--gray);}

.sum3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-bottom:7px;}
.sum2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;margin-bottom:7px;}
.metric{background:var(--bg2);border-radius:var(--radius);padding:9px 10px;text-align:center;}
.mlabel{font-size:11px;color:var(--text3);margin-bottom:3px;}
.mval{font-size:15px;font-weight:500;color:var(--text);}
.mval.danger{color:var(--over-txt);}.mval.success{color:var(--ok-txt);}.mval.warn{color:var(--warn-txt);}
.rate-note{font-size:11px;color:var(--text3);margin-bottom:10px;text-align:right;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-title{font-size:15px;font-weight:500;color:var(--text);}
.cal-nav{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:3px 12px;font-size:16px;cursor:pointer;color:var(--text);}
.cal-nav:hover{background:var(--bg2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;margin-bottom:8px;}
.cal-dow{text-align:center;font-size:11px;color:var(--text3);padding:3px 0;}
.cal-cell{min-height:52px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--card);padding:3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;}
.cal-cell:hover{border-color:var(--border2);}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-cell.selected{border:2px solid var(--blue);}
.cal-cell.today .cday{color:var(--blue);}
.dot{width:5px;height:5px;border-radius:50%;background:var(--gray);}
.has-data .dot{background:var(--green);}
.over-budget .dot{background:var(--red);}
.future-spent .dot{background:var(--amber);}
.cday{font-size:12px;font-weight:500;color:var(--text);}
.camt{font-size:9px;color:var(--text3);text-align:center;line-height:1.2;}
.legend-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);}
.ldot{width:7px;height:7px;border-radius:50%;}
.panel{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:12px;}
.dphead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
.dptitle{font-size:15px;font-weight:500;color:var(--text);}
.badge{font-size:11px;padding:3px 9px;border-radius:var(--radius);font-weight:500;}
.badge-ok{background:var(--ok-bg);color:var(--ok-txt);}
.badge-over{background:var(--over-bg);color:var(--over-txt);}
.badge-empty{background:var(--bg2);color:var(--text3);}
.brow{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3);margin-bottom:8px;flex-wrap:wrap;}
.pct-display{font-size:13px;font-weight:500;min-width:52px;text-align:right;}
.prog-bg{height:5px;background:var(--bg2);border-radius:4px;margin-bottom:12px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;}
.bar-ok{background:var(--green);}.bar-over{background:var(--red);}
.rate-chip{font-size:11px;color:var(--text3);background:var(--bg2);border-radius:6px;padding:2px 7px;white-space:nowrap;}
.exp-card{position:relative;border-radius:10px;overflow:hidden;margin-bottom:8px;}
.exp-delete-zone{position:absolute;right:0;top:0;bottom:0;width:80px;background:var(--red);display:flex;align-items:center;justify-content:center;border-radius:0 10px 10px 0;z-index:0;}
.exp-delete-zone span{color:#fff;font-size:13px;font-weight:500;pointer-events:none;}
.exp-inner{position:relative;z-index:1;background:var(--card2);border:0.5px solid var(--border);border-radius:10px;display:flex;align-items:flex-start;transform:translateX(0);transition:transform .22s ease;will-change:transform;}
.exp-del-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);z-index:5;background:var(--over-bg);color:var(--over-txt);border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .15s;white-space:nowrap;}
@media(pointer:fine){.exp-card:hover .exp-del-btn{opacity:1;pointer-events:auto;}}
.exp-num{font-size:12px;font-weight:500;color:var(--text3);padding:13px 4px 12px 12px;align-self:flex-start;flex-shrink:0;}
.exp-body{flex:1;padding:10px 12px 10px 4px;min-width:0;}
.exp-name-row{margin-bottom:7px;}
.exp-name-inp{font-size:16px;border:none;background:transparent;color:var(--text);width:100%;outline:none;padding:0;}
.exp-name-inp::placeholder{color:var(--text3);}
.exp-name-inp.invalid{border-bottom:1.5px solid var(--red);}
.exp-meta-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.meta-sel{font-size:14px;border:0.5px solid var(--border);border-radius:6px;background:var(--inp-bg);color:var(--text);outline:none;padding:4px 4px;cursor:pointer;-webkit-appearance:none;appearance:none;text-align:center;}
.meta-sel.invalid{border-color:var(--red);}
.cat-sel{width:76px;}.cur-sel{width:54px;}
.meta-inp{font-size:14px;border:0.5px solid var(--border);border-radius:6px;background:var(--inp-bg);color:var(--text);outline:none;padding:4px 6px;}
.meta-inp.invalid{border-color:var(--red);}
.amt-inp{width:88px;}.twd-inp{width:88px;color:var(--text2);}
.twd-inp::placeholder{color:var(--text3);}
.eur-chip{font-size:11px;color:var(--text3);white-space:nowrap;}
.ctx-menu{position:fixed;background:var(--card);border:0.5px solid var(--border2);border-radius:var(--radius);padding:4px 0;z-index:500;min-width:140px;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.ctx-item{padding:10px 16px;font-size:14px;cursor:pointer;color:var(--text);}
.ctx-item:hover{background:var(--bg2);}
.ctx-item.danger{color:var(--over-txt);}
.add-exp-btn{font-size:13px;color:var(--text3);background:none;border:0.5px dashed var(--border2);border-radius:var(--radius);padding:8px 10px;cursor:pointer;width:100%;margin-top:2px;}
.add-exp-btn:hover{background:var(--bg2);}
.dp-footer{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);}
.dp-footer strong{color:var(--text);font-weight:500;}
.dp-footer .danger{color:var(--over-txt);font-weight:500;}
.sec-lbl{font-size:12px;color:var(--text3);margin-bottom:6px;margin-top:14px;}
.cat-panel{background:var(--bg2);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:10px;}
.cat-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.cat-pill{font-size:11px;padding:2px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;}
.cat-edit-icon{cursor:pointer;opacity:.55;font-size:10px;}
.cat-add-row{display:flex;gap:6px;}
.row-btn{font-size:13px;padding:6px 11px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--card);color:var(--text);cursor:pointer;white-space:nowrap;}
.row-btn:hover{background:var(--bg2);}
.row-btn.danger{color:var(--over-txt);}
.full-btn{flex:1;padding:9px;border:0.5px solid var(--border2);border-radius:var(--radius-lg);background:var(--card);color:var(--text);font-size:13px;cursor:pointer;}
.full-btn:hover{background:var(--bg2);}
.text-inp{font-size:16px;padding:5px 8px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--inp-bg);color:var(--text);outline:none;width:100%;}
.budget-inp{font-size:16px;padding:4px 6px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--inp-bg);color:var(--text);outline:none;width:82px;}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:400;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:1.25rem 1.25rem 2rem;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:12px;}
.modal-note{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5;}
.modal-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.preview-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px;}
.preview-table th{text-align:left;padding:4px 6px;color:var(--text3);font-weight:500;border-bottom:0.5px solid var(--border);}
.preview-table td{padding:4px 6px;color:var(--text);border-bottom:0.5px solid var(--border);}
.chart-wrap{position:relative;width:100%;max-width:260px;margin:0 auto 1rem;}
.chart-legend{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.legend-chip{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.edit-cat-row{display:flex;gap:5px;align-items:center;margin-bottom:5px;flex-wrap:wrap;}
</style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen" style="display:none;">
  <div class="auth-screen">
    <div style="font-size:28px;margin-bottom:12px;">✈️</div>
    <div class="auth-title">旅遊預算追蹤</div>
    <div class="auth-sub">輸入 Email，我們會寄送登入連結給你。任何裝置都能同步資料，不需要密碼。</div>
    <input class="auth-input" type="email" id="auth-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')sendMagicLink()" />
    <button class="auth-btn" id="auth-btn" onclick="sendMagicLink()">傳送登入連結</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- Main app -->
<div class="app" id="main-app" style="display:none;">
<div class="top-bar">
  <span style="font-size:18px;flex-shrink:0;">✈️</span>
  <input class="trip-inp" type="text" id="trip-name" value="歐洲之旅" oninput="S.tripName=this.value;scheduleSave()" />
  <div class="sync-dot offline" id="sync-dot" title="同步狀態"></div>
  <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
  <button class="icon-btn" onclick="signOut()">登出</button>
</div>

<div id="sum-top"></div>
<div id="sum-bot"></div>
<div class="rate-note" id="rate-note"></div>

<div class="cal-header">
  <button class="cal-nav" onclick="chMon(-1)">&#8249;</button>
  <div class="cal-title" id="cal-title"></div>
  <button class="cal-nav" onclick="chMon(1)">&#8250;</button>
</div>
<div class="cal-grid" id="cal-grid"></div>
<div class="legend-row">
  <div class="legend-item"><div class="ldot" style="background:var(--gray)"></div>僅預算</div>
  <div class="legend-item"><div class="ldot" style="background:var(--green)"></div>結餘</div>
  <div class="legend-item"><div class="ldot" style="background:var(--red)"></div>超支</div>
  <div class="legend-item"><div class="ldot" style="background:var(--amber)"></div>未來已記錄</div>
</div>
<div id="detail-area"></div>

<div class="sec-lbl">花費類別分析</div>
<div class="panel" id="chart-panel"><div style="font-size:13px;color:var(--text3);text-align:center;padding:1rem 0;">尚無花費資料</div></div>

<div class="sec-lbl">資料備份</div>
<div style="display:flex;gap:8px;margin-bottom:14px;">
  <button class="full-btn" onclick="downloadCSV()">⬇ 下載 CSV</button>
  <button class="full-btn" onclick="triggerImport()">⬆ 上傳 CSV</button>
  <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="handleCSVFile(this)" />
</div>

<div class="sec-lbl">類別標籤</div>
<div class="cat-panel">
  <div class="cat-list" id="cat-list"></div>
  <div id="cat-edit-area"></div>
  <div class="cat-add-row">
    <input class="text-inp" type="text" id="new-cat" placeholder="新增類別（支援 emoji）" maxlength="20" onkeydown="if(event.key==='Enter')addCat()" style="flex:1;" />
    <button class="row-btn" onclick="addCat()">新增</button>
  </div>
</div>
<div style="font-size:11px;color:var(--text3);text-align:center;margin-top:8px;" id="user-email-display"></div>
</div>

<div id="modal-area"></div>

<script>
// ── Supabase setup ──
const SUPA_URL='https://bvoeqqmxgnqnmtvnieoz.supabase.co';
const SUPA_KEY='sb_publishable_kv4bqkPwDw_bbRUYcADDUw_zpkDx7RC';
const {createClient}=supabase;
const sb=createClient(SUPA_URL,SUPA_KEY);

const CHART_COLORS=['#1D9E75','#185FA5','#7F77DD','#D85A30','#D4537E','#BA7517','#639922','#888780','#E24B4A','#0F6E56'];
const PAL=[{c:'#0F6E56',bg:'#E1F5EE'},{c:'#185FA5',bg:'#E6F1FB'},{c:'#534AB7',bg:'#EEEDFE'},{c:'#993C1D',bg:'#FAECE7'},{c:'#993556',bg:'#FBEAF0'},{c:'#854F0B',bg:'#FAEEDA'},{c:'#3B6D11',bg:'#EAF3DE'},{c:'#5F5E5A',bg:'#F1EFE8'}];
const CATS0=[{id:'c1',name:'🍜 餐飲',c:'#0F6E56',bg:'#E1F5EE'},{id:'c2',name:'🚇 交通',c:'#185FA5',bg:'#E6F1FB'},{id:'c3',name:'🏨 住宿',c:'#534AB7',bg:'#EEEDFE'},{id:'c4',name:'🎫 門票',c:'#993C1D',bg:'#FAECE7'},{id:'c5',name:'🛍️ 購物',c:'#993556',bg:'#FBEAF0'},{id:'c6',name:'📦 其他',c:'#5F5E5A',bg:'#F1EFE8'}];
const DEF_RATES={EUR_TWD:37.15,USD_TWD:31.64,EUR_USD:1.174};

let S={tripName:'歐洲之旅',vy:2026,vm:4,sel:null,cats:[],days:{},latestRates:{...DEF_RATES},ratesFetchedAt:null,theme:'light'};
let editCatId=null,ctxMenu=null,pieChart=null,swipedInner=null;
let currentUser=null,saveTimer=null,lastSyncTime=null;

function uid(){return 'x'+Math.random().toString(36).slice(2,8);}
function dk(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function todayKey(){const t=new Date();return dk(t.getFullYear(),t.getMonth(),t.getDate());}
function fc(n){const neg=n<0;return(neg?'-':'')+'€'+Math.abs(n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fca(n){return'€'+Math.abs(n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});}

function applyTheme(){document.documentElement.setAttribute('data-theme',S.theme);document.getElementById('theme-btn').textContent=S.theme==='dark'?'☀️':'🌙';}
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';applyTheme();scheduleSave();}

function toEUR(amt,cur,rates){
  const a=parseFloat(amt)||0,r=rates||S.latestRates;
  if(cur==='EUR')return a;
  if(cur==='USD')return a/(r.EUR_USD||1.174);
  if(cur==='NTD')return a/(r.EUR_TWD||37.15);
  return a;
}
function daySpent(d){if(!d)return 0;const rates=d.rates||S.latestRates;return(d.expenses||[]).reduce((a,e)=>a+toEUR(e.amt,e.cur,rates),0);}
function dayEUR(d){if(!d)return{spent:0,budget:0};return{spent:daySpent(d),budget:parseFloat(d.budget)||0};}

function setSyncDot(state){
  const dot=document.getElementById('sync-dot');if(!dot)return;
  dot.className='sync-dot'+(state==='ok'?'':state==='syncing'?' syncing':' offline');
  dot.title=state==='ok'?'已同步':state==='syncing'?'同步中…':'離線';
}

// ── Cloud sync ──
async function loadFromCloud(){
  if(!currentUser)return false;
  try{
    const{data,error}=await sb.from('budget_data').select('data').eq('user_id',currentUser.id).single();
    if(error&&error.code!=='PGRST116')throw error;
    if(data&&data.data){
      const remote=data.data;
      S={...S,...remote};
      if(!S.latestRates)S.latestRates={...DEF_RATES};
      if(!S.cats||!S.cats.length)S.cats=JSON.parse(JSON.stringify(CATS0));
      if(!S.theme)S.theme='light';
      localStorage.setItem('tb_v12_local',JSON.stringify(S));
      return true;
    }
  }catch(e){console.warn('cloud load failed',e);}
  return false;
}

async function saveToCloud(){
  if(!currentUser)return;
  setSyncDot('syncing');
  try{
    const{error}=await sb.from('budget_data').upsert({user_id:currentUser.id,data:S,updated_at:new Date().toISOString()},{onConflict:'user_id'});
    if(error)throw error;
    localStorage.setItem('tb_v12_local',JSON.stringify(S));
    setSyncDot('ok');
    lastSyncTime=Date.now();
  }catch(e){
    console.warn('cloud save failed',e);
    localStorage.setItem('tb_v12_local',JSON.stringify(S));
    setSyncDot('offline');
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveToCloud(),1500);
}

function prefillBudgets(){
  const start=new Date(2026,4,6),end=new Date(2026,7,21);
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const k=dk(d.getFullYear(),d.getMonth(),d.getDate());
    if(!S.days[k])S.days[k]={budget:100,expenses:[],rates:null};
  }
}

function loadLocal(){
  try{
    const s=localStorage.getItem('tb_v12_local');

async function fetchRates(){
  const now=Date.now();
  if(S.ratesFetchedAt&&now-S.ratesFetchedAt<3600000)return;
  try{
    const r=await fetch('https://api.frankfurter.app/latest?from=EUR&to=TWD,USD');
    if(!r.ok)throw 0;
    const data=await r.json();
    S.latestRates={EUR_TWD:data.rates.TWD,EUR_USD:data.rates.USD,USD_TWD:data.rates.TWD/data.rates.USD};
    S.ratesFetchedAt=now;scheduleSave();renderRateNote();
  }catch(e){}
}

function validateExp(exp){return{desc:!(exp.desc||'').trim(),cat:!exp.catId,amt:!(parseFloat(exp.amt)>0)};}

function attachSwipe(inner,onDelete){
  const DIST=80;let startX=0,startY=0,tracking=false,isH=null;
  inner.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;tracking=true;isH=null;},{passive:true});
  inner.addEventListener('touchmove',e=>{
    if(!tracking)return;
    const dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;
    if(isH===null){if(Math.abs(dx)<4&&Math.abs(dy)<4)return;isH=Math.abs(dx)>Math.abs(dy);}
    if(!isH)return;
    e.preventDefault();
    inner.style.transition='none';
    inner.style.transform=`translateX(${Math.max(-DIST,Math.min(0,dx))}px)`;
  },{passive:false});
  inner.addEventListener('touchend',e=>{
    if(!tracking)return;tracking=false;if(!isH)return;
    const dx=e.changedTouches[0].clientX-startX;
    inner.style.transition='transform .22s ease';
    if(dx<-DIST*0.5){
      inner.style.transform=`translateX(-${DIST}px)`;
      if(swipedInner&&swipedInner!==inner)swipedInner.style.transform='translateX(0)';
      swipedInner=inner;
    }else{inner.style.transform='translateX(0)';if(swipedInner===inner)swipedInner=null;}
  },{passive:true});
  inner.addEventListener('click',e=>{
    const tx=parseFloat(inner.style.transform.replace(/[^-\d.]/g,'')||'0');
    if(tx<-10){e.stopPropagation();resetSwipe();}
  });
}

function downloadCSV(){
  const rows=[['日期','預算(EUR)','項目','類別','幣別','原始金額','NT$對應','EUR等值','當日匯率EUR_TWD','當日匯率EUR_USD']];
  Object.keys(S.days).sort().forEach(k=>{const d=S.days[k];const rates=d.rates||S.latestRates;if(!(d.expenses||[]).length){rows.push([k,d.budget,'','','','','','',rates.EUR_TWD.toFixed(4),rates.EUR_USD.toFixed(4)]);return;}d.expenses.forEach(e=>{const cat=S.cats.find(c=>c.id===e.catId);rows.push([k,d.budget,e.desc||'',cat?cat.name:'',e.cur,e.amt!=null?e.amt:'',e.twd!=null?e.twd:'',toEUR(e.amt,e.cur,rates).toFixed(2),rates.EUR_TWD.toFixed(4),rates.EUR_USD.toFixed(4)]);});});
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(S.tripName||'旅遊預算')+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{try{const text=e.target.result.replace(/^\uFEFF/,'');const lines=text.split('\n').filter(l=>l.trim());const headers=parseCSVLine(lines[0]).map(h=>h.trim());const rows=lines.slice(1).map(l=>parseCSVLine(l));showImportModal(headers,rows.slice(0,5),rows);}catch(err){alert('CSV 格式錯誤');}};
  reader.readAsText(file,'UTF-8');input.value='';
}
function parseCSVLine(line){const result=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===','&&!inQ){result.push(cur);cur='';}else cur+=ch;}result.push(cur);return result;}
function showImportModal(headers,previewRows,allRows){
  const overlay=document.createElement('div');overlay.className='modal-overlay';
  const box=document.createElement('div');box.className='modal-box';
  const colMap={date:headers.indexOf('日期'),budget:headers.indexOf('預算(EUR)'),desc:headers.indexOf('項目'),cat:headers.indexOf('類別'),cur:headers.indexOf('幣別'),amt:headers.indexOf('原始金額'),twd:headers.indexOf('NT$對應'),rateETW:headers.indexOf('當日匯率EUR_TWD'),rateEU:headers.indexOf('當日匯率EUR_USD')};
  if(colMap.date<0){alert('找不到「日期」欄位');return;}
  let th='<table class="preview-table"><thead><tr><th>日期</th><th>項目</th><th>幣別</th><th>金額</th></tr></thead><tbody>';
  previewRows.forEach(r=>{th+=`<tr><td>${r[colMap.date]||''}</td><td>${r[colMap.desc]||''}</td><td>${r[colMap.cur]||''}</td><td>${r[colMap.amt]||''}</td></tr>`;});
  th+='</tbody></table>';
  if(allRows.length>5)th+=`<div style="font-size:11px;color:var(--text3);margin-bottom:8px;">…共 ${allRows.length} 筆</div>`;
  box.innerHTML=`<div class="modal-title">預覽 CSV 資料</div><div class="modal-note">請確認資料後選擇匯入方式。</div>${th}<div class="modal-btns"><button class="row-btn" id="im-merge">合併（保留現有）</button><button class="row-btn danger" id="im-replace">完全覆蓋</button><button class="row-btn" id="im-cancel">取消</button></div>`;
  overlay.appendChild(box);document.getElementById('modal-area').appendChild(overlay);
  document.getElementById('im-cancel').onclick=()=>overlay.remove();
  document.getElementById('im-merge').onclick=()=>{importCSV(allRows,colMap,false);overlay.remove();};
  document.getElementById('im-replace').onclick=()=>{if(confirm('確定要覆蓋所有現有資料？')){importCSV(allRows,colMap,true);overlay.remove();}};
}
function importCSV(rows,colMap,replace){
  if(replace)S.days={};
  rows.forEach(r=>{
    const k=(r[colMap.date]||'').trim();if(!k||!/^\d{4}-\d{2}-\d{2}$/.test(k))return;
    const desc=(r[colMap.desc]||'').trim();const budget=parseFloat(r[colMap.budget])||100;
    const rateETW=parseFloat(r[colMap.rateETW])||S.latestRates.EUR_TWD;const rateEU=parseFloat(r[colMap.rateEU])||S.latestRates.EUR_USD;
    if(!S.days[k])S.days[k]={budget,expenses:[],rates:{EUR_TWD:rateETW,EUR_USD:rateEU,USD_TWD:rateETW/rateEU}};
    else{S.days[k].budget=budget;if(!S.days[k].rates)S.days[k].rates={EUR_TWD:rateETW,EUR_USD:rateEU,USD_TWD:rateETW/rateEU};}
    if(!desc)return;
    const catName=(r[colMap.cat]||'').trim();let catId=null;
    if(catName){let cat=S.cats.find(c=>c.name===catName);if(!cat){const p=PAL[S.cats.length%PAL.length];cat={id:uid(),name:catName,c:p.c,bg:p.bg};S.cats.push(cat);}catId=cat.id;}
    const cur=(r[colMap.cur]||'EUR').trim();const amt=r[colMap.amt]||'';const twd=r[colMap.twd]||null;
    if(!replace){const exists=S.days[k].expenses.some(e=>e.desc===desc&&String(e.amt)===String(amt)&&e.cur===cur);if(exists)return;}
    S.days[k].expenses.push({id:uid(),desc,cur,amt,twd:twd||null,catId});
  });
  sr();alert('匯入完成！');
}

function render(){renderSummary();renderRateNote();renderCal();renderDetail();renderChart();renderCats();}

// kick off
initAuth();
</script>
