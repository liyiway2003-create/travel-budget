<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅遊預算追蹤</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* (保留你提供的所有 CSS 樣式，此處省略以節省空間) */
        :root { --bg:#f5f5f3; --text:#1a1a18; --blue:#185FA5; --border:rgba(0,0,0,0.12); --radius:8px; --radius-lg:12px; }
        [data-theme="dark"] { --bg:#1a1a18; --text:#f0efec; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin:0; }
        .app { max-width: 480px; margin: 0 auto; padding: 1rem; }
        .auth-screen { text-align:center; padding: 50px 20px; }
        .auth-input { width: 80%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .auth-btn { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-cell { aspect-ratio: 1/1; border: 1px solid var(--border); border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .cal-cell.selected { border: 2px solid var(--blue); }
    </style>
</head>
<body>

<div id="auth-screen" style="display:none;">
    <div class="auth-screen">
        <h2>✈️ 旅遊預算追蹤</h2>
        <input class="auth-input" type="email" id="auth-email" placeholder="輸入 Email">
        <button class="auth-btn" id="auth-btn" onclick="sendMagicLink()">傳送登入連結</button>
        <p id="auth-msg"></p>
    </div>
</div>

<div class="app" id="main-app" style="display:none;">
    <div class="top-bar">
        <input id="trip-name" style="font-size:18px; border:none; background:transparent; font-weight:bold;">
        <div>
            <button onclick="toggleTheme()">🌓</button>
            <button onclick="signOut()">登出</button>
        </div>
    </div>
    <div id="sum-area"></div>
    <div class="cal-header" style="text-align:center; margin-bottom:10px;">
        <button onclick="chMon(-1)">◀</button>
        <span id="cal-title" style="margin: 0 20px; font-weight:bold;"></span>
        <button onclick="chMon(1)">▶</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="detail-area" style="margin-top:20px;"></div>
</div>

<script>
    // --- 基礎設定 ---
    const SUPA_URL = 'https://bvoeqqmxgnqnmtvnieoz.supabase.co';
    const SUPA_KEY = 'sb_publishable_kv4bqkPwDw_bbRUYcADDUw_zpkDx7RC';
    const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
    
    // 自動獲取當前網址作為重定向位址，解決手機版/GitHub Pages路徑不對的問題
    const REDIRECT_URL = window.location.origin + window.location.pathname;

    let S = { tripName: '歐洲之旅', vy: 2026, vm: 5, sel: null, days: {}, theme: 'light' };
    let currentUser = null;
    let saveTimer = null;

    // --- 核心功能 ---
    async function sendMagicLink() {
        const email = document.getElementById('auth-email').value;
        const { error } = await sb.auth.signInWithOtp({ 
            email, 
            options: { emailRedirectTo: REDIRECT_URL } 
        });
        document.getElementById('auth-msg').innerText = error ? "錯誤: " + error.message : "已寄出！請至信箱點擊連結";
    }

    async function signOut() {
        await sb.auth.signOut();
        location.reload();
    }

    async function onSignedIn(user) {
        currentUser = user;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        
        // 從雲端載入
        const { data } = await sb.from('budget_data').select('data').eq('user_id', user.id).single();
        if (data) S = { ...S, ...data.data };
        
        document.getElementById('trip-name').value = S.tripName;
        render();
    }

    function render() {
        // 更新標題
        document.getElementById('cal-title').innerText = `${S.vy} 年 ${S.vm + 1} 月`;
        
        // 更新日曆
        const grid = document.getElementById('cal-grid');
        grid.innerHTML = '';
        const daysInMonth = new Date(S.vy, S.vm + 1, 0).getDate();
        
        for (let d = 1; d <= daysInMonth; d++) {
            const k = `${S.vy}-${String(S.vm + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const cell = document.createElement('div');
            cell.className = `cal-cell ${S.sel === k ? 'selected' : ''}`;
            cell.innerText = d;
            cell.onclick = () => { S.sel = k; render(); };
            grid.appendChild(cell);
        }
        
        // 更新詳情
        renderDetail();
    }

    function renderDetail() {
        const area = document.getElementById('detail-area');
        if (!S.sel) { area.innerHTML = "請點擊日期來編輯預算"; return; }
        
        const k = S.sel;
        if (!S.days[k]) S.days[k] = { budget: 100, expenses: [] };
        const dayData = S.days[k];

        area.innerHTML = `
            <div style="background:#fff; padding:15px; border-radius:10px; border:1px solid #ddd; color:#333">
                <h3>📅 日期: ${k}</h3>
                <label>每日預算 (EUR): </label>
                <input type="number" value="${dayData.budget}" onchange="updateBudget('${k}', this.value)">
                <hr>
                <div id="exp-list"></div>
                <button onclick="addExp('${k}')" style="width:100%; padding:10px; margin-top:10px;">+ 新增花費</button>
            </div>
        `;
        
        const list = document.getElementById('exp-list');
        dayData.expenses.forEach((ex, i) => {
            const row = document.createElement('div');
            row.innerHTML = `<input value="${ex.desc}" onchange="updateExp('${k}',${i},'desc',this.value)"> 
                             €<input type="number" value="${ex.amt}" style="width:60px" onchange="updateExp('${k}',${i},'amt',this.value)">`;
            list.appendChild(row);
        });
    }

    // --- 資料操作 ---
    function updateBudget(k, val) { S.days[k].budget = val; scheduleSave(); }
    function addExp(k) { S.days[k].expenses.push({ desc: '新項目', amt: 0 }); render(); scheduleSave(); }
    function updateExp(k, i, field, val) { S.days[k].expenses[i][field] = val; scheduleSave(); }

    function scheduleSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
            if (!currentUser) return;
            await sb.from('budget_data').upsert({ user_id: currentUser.id, data: S });
        }, 1000);
    }

    function chMon(n) { S.vm += n; if (S.vm > 11) { S.vm = 0; S.vy++; } else if (S.vm < 0) { S.vm = 11; S.vy--; } render(); }
    function toggleTheme() { S.theme = S.theme === 'light' ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', S.theme); }

    // --- 啟動 ---
    (async function() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) onSignedIn(session.user);
        else document.getElementById('auth-screen').style.display = 'block';

        sb.auth.onAuthStateChange((_evt, session) => {
            if (session && !currentUser) onSignedIn(session.user);
        });
    })();
</script>
</body>
</html>
